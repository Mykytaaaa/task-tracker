name: Build and Test CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore TaskTracker.sln

    - name: Run analysis
      run: |
        dotnet format style TaskTracker.sln --verify-no-changes --no-restore
        dotnet format analyzers TaskTracker.sln --verify-no-changes --no-restore

    - name: Build Solution
      run: dotnet build TaskTracker.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test TaskTracker.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.4.3
      with:
        reports: 'coverage/**/coverage.cobertura.xml'
        targetdir: 'coverage/summary'
        reporttypes: 'MarkdownSummary'

    - name: Publish coverage report to job summary
      run: |
        cat coverage/summary/Summary.md >> $env:GITHUB_STEP_SUMMARY
