name: Build and Test CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore TaskTracker.sln

    - name: Run analysis
      run: |
        dotnet format style TaskTracker.sln --verify-no-changes --no-restore
        dotnet format analyzers TaskTracker.sln --verify-no-changes --no-restore

    - name: Build Solution
      run: dotnet build TaskTracker.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test TaskTracker.sln --configuration Release --no-build --verbosity normal
